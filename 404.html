<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page not found | Joshua Coetzer</title>
    <meta name="description" content="That page does not exist. Head back to the portfolio or blog.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.tarsonlinecafe.work/404.html">
    <link rel="icon" href="/67793100.png" type="image/png">
    <meta name="theme-color" content="#2d221b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles/themes.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, sans-serif;
            background:
                radial-gradient(900px 480px at 12% -10%, rgba(201, 169, 110, 0.18), transparent 55%),
                radial-gradient(700px 400px at 88% 8%, rgba(161, 134, 111, 0.12), transparent 50%),
                var(--dark-roast, #2d221b);
            color: var(--foam, #f7efe2);
        }
        .error-wrap {
            min-height: calc(100vh - 5rem);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 1.25rem 3rem;
        }
        .error-card {
            max-width: 520px;
            width: 100%;
            text-align: center;
            padding: 2.75rem 2.25rem;
            border-radius: 24px;
            background: rgba(45, 34, 27, 0.55);
            border: 1px solid rgba(247, 239, 226, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
        }
        .error-code {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: clamp(4rem, 14vw, 6.5rem);
            line-height: 1;
            margin: 0 0 0.5rem;
            color: var(--crema, #c9a96e);
            letter-spacing: -0.04em;
        }
        .error-title {
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 1.65rem;
            margin: 0 0 1rem;
            color: var(--foam, #f7efe2);
        }
        .error-body {
            color: rgba(237, 224, 204, 0.88);
            line-height: 1.65;
            margin: 0 0 2rem;
            font-size: 1rem;
        }
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.95rem;
            background: var(--crema, #c9a96e);
            color: var(--espresso, #1a1108) !important;
            text-decoration: none !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 169, 110, 0.35);
        }
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.95rem;
            border: 1.5px solid rgba(247, 239, 226, 0.35);
            color: var(--foam, #f7efe2) !important;
            text-decoration: none !important;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .btn-secondary:hover {
            border-color: var(--crema, #c9a96e);
            background: rgba(201, 169, 110, 0.1);
        }
        @media (prefers-reduced-motion: reduce) {
            .btn-primary:hover { transform: none; box-shadow: none; }
        }
        .simple-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 64px;
            padding: 0 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            background: rgba(26, 17, 8, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(247, 239, 226, 0.08);
        }
        .simple-header a.brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: "DM Serif Display", Georgia, serif;
            font-size: 1.1rem;
            color: var(--foam, #f7efe2) !important;
            text-decoration: none !important;
        }
        .simple-header .links {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .simple-header .links a {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(247, 239, 226, 0.8) !important;
            text-decoration: none !important;
        }
        .simple-header .links a:hover {
            color: var(--crema, #c9a96e) !important;
        }
    </style>
</head>
<body>
    <header class="simple-header" role="banner">
      <a href="/" class="brand" aria-label="TarsOnlineCafe home"><span aria-hidden="true">☕</span> TarsOnlineCafe</a>
      <nav class="links" aria-label="Site">
        <a href="/#services">Services</a>
        <a href="/#work">Work</a>
        <a href="/blog/blog.html">Blog</a>
        <a href="/#contact">Contact</a>
      </nav>
    </header>

    <div class="error-wrap">
        <div class="error-card">
            <p class="error-code">404</p>
            <h1 class="error-title">This page is not on the menu</h1>
            <p class="error-body">
              The link may be outdated or the URL was mistyped. You can return to the portfolio home or open the blog.
            </p>
            <div class="error-actions">
                <a href="/" class="btn-primary">Back to portfolio</a>
                <a href="/blog/blog.html" class="btn-secondary">Visit blog</a>
            </div>
        </div>
    </div>
    <script defer src="/scripts/lazy-loading.js"></script>
</body>
</html>
